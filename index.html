<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Speed Test by Jinsun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .japanese-text {
            font-family: 'Noto Sans JP', sans-serif;
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .progress-bar {
            transition: width 0.1s linear;
        }

        .mode-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .mode-card:hover {
            transform: translateY(-4px);
            border-color: #6366f1;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.1);
        }

        .n-level-btn {
            transition: all 0.2s ease;
        }
        .n-level-btn.active {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }

        .word-type-btn {
            transition: all 0.2s ease;
        }
        .word-type-btn.active {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }

        .social-link {
            transition: all 0.2s ease;
        }
        .social-link:hover {
            color: #4f46e5;
            transform: translateY(-1px);
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative">

    <div id="game-container" class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md border border-slate-100 relative z-10 min-h-[600px] flex flex-col">
        <!-- Header -->
        <div id="game-header" class="flex justify-between items-center mb-6">
            <div class="text-slate-500 font-semibold uppercase tracking-wider text-[10px] sm:text-xs" id="mode-label">Japanese Speed Test by Jinsun</div>
            <!-- Timer Display Hidden on Home Screen -->
            <div id="timer-display" class="hidden text-xl font-bold text-indigo-600 tabular-nums">00:30</div>
        </div>

        <!-- Mode Selection Home Page -->
        <div id="home-screen" class="space-y-4 flex-grow flex flex-col">
            <div class="text-center space-y-2 mb-2">
                <h1 class="text-3xl font-extrabold text-slate-800">Learn Japanese</h1>
                <p class="text-slate-500 text-sm">Pick a mode to start your speed trial</p>
            </div>

            <div class="grid gap-3">
                <button onclick="selectMode('hiragana')" class="mode-card flex items-center p-4 bg-white border-2 border-slate-100 rounded-2xl group">
                    <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center text-xl font-bold group-hover:bg-indigo-600 group-hover:text-white transition-colors">あ</div>
                    <div class="ml-4 text-left">
                        <div class="font-bold text-slate-800">Hiragana</div>
                        <div class="text-xs text-slate-400">Basic phonetic script</div>
                    </div>
                </button>

                <button onclick="selectMode('katakana')" class="mode-card flex items-center p-4 bg-white border-2 border-slate-100 rounded-2xl group">
                    <div class="w-10 h-10 bg-pink-50 text-pink-600 rounded-xl flex items-center justify-center text-xl font-bold group-hover:bg-pink-600 group-hover:text-white transition-colors">ア</div>
                    <div class="ml-4 text-left">
                        <div class="font-bold text-slate-800">Katakana</div>
                        <div class="text-xs text-slate-400">Foreign loan words</div>
                    </div>
                </button>

                <button onclick="selectMode('kanji')" class="mode-card flex items-center p-4 bg-white border-2 border-slate-100 rounded-2xl group">
                    <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center text-xl font-bold group-hover:bg-emerald-600 group-hover:text-white transition-colors">学</div>
                    <div class="ml-4 text-left">
                        <div class="font-bold text-slate-800">Kanji</div>
                        <div class="text-xs text-slate-400">Logographic characters</div>
                    </div>
                </button>
            </div>
        </div>

        <!-- Configuration Screen -->
        <div id="start-screen" class="hidden space-y-5 flex-grow flex flex-col justify-center">
            <div class="text-center space-y-1">
                <button onclick="showHome()" class="text-indigo-600 text-xs font-bold uppercase hover:underline mb-2 inline-block">← Back to Menu</button>
                <h1 class="text-2xl font-extrabold text-slate-800" id="difficulty-title">Configuration</h1>
            </div>

            <div class="space-y-4">
                <!-- JLPT N-Level Toggle -->
                <div id="n-level-section" class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3 hidden">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wide">Difficulty Level (JLPT)</label>
                    <div class="grid grid-cols-5 gap-2">
                        <button onclick="setNLevel(5)" id="n5-btn" class="n-level-btn py-2 text-sm font-bold border-2 border-slate-200 rounded-xl bg-white text-slate-500 active">N5</button>
                        <button onclick="setNLevel(4)" id="n4-btn" class="n-level-btn py-2 text-sm font-bold border-2 border-slate-200 rounded-xl bg-white text-slate-500">N4</button>
                        <button onclick="setNLevel(3)" id="n3-btn" class="n-level-btn py-2 text-sm font-bold border-2 border-slate-200 rounded-xl bg-white text-slate-500">N3</button>
                        <button onclick="setNLevel(2)" id="n2-btn" class="n-level-btn py-2 text-sm font-bold border-2 border-slate-200 rounded-xl bg-white text-slate-500">N2</button>
                        <button onclick="setNLevel(1)" id="n1-btn" class="n-level-btn py-2 text-sm font-bold border-2 border-slate-200 rounded-xl bg-white text-slate-500">N1</button>
                    </div>
                </div>

                <!-- Word Type Toggle -->
                <div id="word-type-section" class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wide">Word Type</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setWordType('random')" id="type-random-btn" class="word-type-btn py-2 text-sm font-bold border-2 border-slate-200 rounded-xl bg-white text-slate-500 active">Random</button>
                        <button onclick="setWordType('real')" id="type-real-btn" class="word-type-btn py-2 text-sm font-bold border-2 border-slate-200 rounded-xl bg-white text-slate-500">Real Words</button>
                    </div>
                </div>

                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wide">Round Time: <span id="time-val" class="text-indigo-600">30</span>s</label>
                    <input type="range" id="time-slider" min="10" max="120" step="10" value="30" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                </div>

                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3">
                    <div class="flex justify-between items-center">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wide">Word Length</label>
                        <span class="text-[10px] text-slate-400 font-bold uppercase">Max: 15</span>
                    </div>
                    <input type="number" id="length-input" min="1" max="15" value="1" 
                           class="w-full bg-white border border-slate-200 rounded-xl py-2 px-4 text-center text-xl font-bold text-slate-700 focus:border-indigo-500 outline-none">
                </div>
            </div>
            
            <button onclick="startGame()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-indigo-200">
                Start Blitz
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden text-center space-y-6 flex-grow relative pt-8">
            <button onclick="promptExit()" class="absolute -top-2 -right-2 p-2 text-slate-300 hover:text-red-500 transition-colors z-20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </button>

            <div class="relative h-2 w-full bg-slate-100 rounded-full overflow-hidden mb-4">
                <div id="timer-bar" class="progress-bar absolute top-0 left-0 h-full bg-indigo-500 w-full"></div>
            </div>

            <div class="flex flex-col items-center justify-center min-h-[140px]">
                <div id="hint-display" class="text-indigo-400 text-sm font-semibold italic h-5 mb-1"></div>
                <div id="word-display" class="japanese-text text-4xl font-bold text-slate-900 select-none break-all leading-tight"></div>
                <div id="level-badge" class="mt-2 text-[10px] font-bold bg-slate-100 px-2 py-1 rounded text-slate-400 uppercase tracking-widest"></div>
            </div>

            <div class="space-y-4">
                <input 
                    type="text" 
                    id="answer-input" 
                    autocomplete="off" 
                    spellcheck="false"
                    placeholder="Type romaji..."
                    class="w-full text-center text-xl py-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-indigo-500 focus:ring-0 outline-none transition-all placeholder:text-slate-300"
                >
                <div class="flex justify-center items-center gap-2">
                    <span class="text-sm font-medium text-slate-400">Score:</span>
                    <span id="score-display" class="text-xl font-bold text-slate-800">0</span>
                </div>
            </div>
        </div>

        <!-- End Screen -->
        <div id="end-screen" class="hidden text-center space-y-6 flex-grow flex flex-col justify-center">
            <div class="py-4">
                <div class="text-5xl mb-2">🏆</div>
                <h2 class="text-2xl font-extrabold text-slate-800">Time's Up!</h2>
                <div class="mt-4 flex flex-col items-center gap-2">
                    <div class="px-6 py-2 bg-indigo-50 text-indigo-700 rounded-full font-bold">
                        Score: <span id="final-score">0</span>
                    </div>
                    <div class="text-slate-400 font-bold uppercase text-[10px] tracking-widest flex gap-4">
                        <span>Level: <span id="final-level" class="text-slate-600">N5</span></span>
                        <span>Time: <span id="final-duration" class="text-slate-600">30s</span></span>
                    </div>
                </div>
            </div>
            <div class="text-sm text-slate-500 italic px-4" id="feedback-msg"></div>
            <button onclick="showHome()" class="w-full py-4 bg-slate-800 hover:bg-slate-900 text-white rounded-2xl font-bold transition-all transform hover:scale-[1.02]">
                Back to Menu
            </button>
        </div>
    </div>

    <!-- Exit Confirmation Modal -->
    <div id="exit-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl text-center space-y-6">
            <div class="space-y-2">
                <div class="text-3xl">🛑</div>
                <h3 class="text-xl font-bold text-slate-800">Wait!</h3>
                <p class="text-slate-500 text-sm">Are you sure you want to exit?</p>
            </div>
            <div class="flex flex-col gap-2">
                <button onclick="confirmExit()" class="py-3 bg-red-500 text-white rounded-xl font-bold hover:bg-red-600">Yes, Exit</button>
                <button onclick="cancelExit()" class="py-3 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Restored Info & Footer -->
    <div class="w-full max-w-4xl mt-8 flex flex-col md:flex-row justify-between items-center md:items-end gap-6 px-4 pb-8">
        <footer class="text-slate-400 text-sm font-medium tracking-wide">
            © 2026 じんせいかいはつ
        </footer>
        <div class="flex flex-col items-center md:items-end gap-2">
            <div class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-300 mb-1">Developer Links</div>
            <div class="flex flex-wrap justify-center md:justify-end gap-x-4 gap-y-2 text-xs font-semibold text-slate-400">
                <a href="https://jinsunb.github.io/Jinsun/" target="_blank" class="social-link">Website</a>
                <a href="https://www.facebook.com/jinsun.bautista" target="_blank" class="social-link">Facebook</a>
                <a href="https://www.youtube.com/@PocialJ" target="_blank" class="social-link">YouTube (PocialJ)</a>
                <a href="https://www.youtube.com/@JinSunR_" target="_blank" class="social-link">YouTube (JinSunR)</a>
            </div>
        </div>
    </div>

        const scoreDisplay = document.getElementById('score-display');
        const timerDisplay = document.getElementById('timer-display');
        const timerBar = document.getElementById('timer-bar');
        const finalScore = document.getElementById('final-score');
        const finalLevel = document.getElementById('final-level');
        const finalDuration = document.getElementById('final-duration');
        const feedbackMsg = document.getElementById('feedback-msg');
        const timeSlider = document.getElementById('time-slider');
        const timeValDisplay = document.getElementById('time-val');
        const lengthInput = document.getElementById('length-input');
        const modeLabel = document.getElementById('mode-label');

        function setNLevel(level) {
            currentNLevel = level;
            document.querySelectorAll('.n-level-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`n${level}-btn`).classList.add('active');
        }

        function setWordType(type) {
            wordType = type;
            document.querySelectorAll('.word-type-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`type-${type}-btn`).classList.add('active');
        }

        timeSlider.addEventListener('input', (e) => {
            totalTime = parseInt(e.target.value);
            timeValDisplay.innerText = totalTime;
            timerDisplay.innerText = `00:${totalTime.toString().padStart(2, '0')}`;
        });

        lengthInput.addEventListener('change', (e) => {
            let val = parseInt(e.target.value);
            if (val < 1) val = 1;
            if (val > 15) val = 15;
            e.target.value = val;
        });

        function buildPool(type, len) {
            const pool = [];
            const used = new Set();
            const charMap = type === 'hiragana' ? HIRAGANA_BASE : KATAKANA_BASE;
            const chars = Object.keys(charMap);

            if (type === 'kanji') {
                const basePool = KANJI_DATA[`N${currentNLevel}`] || KANJI_DATA.N5;
                const filtered = basePool.filter(w => w.h.length === len);
                if (filtered.length > 0) return filtered;
                return basePool.sort((a,b) => Math.abs(a.h.length - len) - Math.abs(b.h.length - len)).slice(0, 10);
            }

            if (wordType === 'real' && type !== 'kanji') {
                const g = GRAMMAR[type];
                let allSentences = [];
                
                // Add single words
                allSentences.push(...g.subjects, ...g.objects, ...g.verbs_transitive, ...g.verbs_intransitive);
                
                // Add Subject + wa + Verb (Intransitive)
                g.subjects.forEach(s => {
                    g.verbs_intransitive.forEach(v => {
                        allSentences.push({ h: s.h + g.p_wa.h + v.h, r: s.r + g.p_wa.r + v.r });
                    });
                });

                // Add Subject + wa + Object + wo + Verb (Transitive)
                g.subjects.forEach(s => {
                    g.objects.forEach(o => {
                        g.verbs_transitive.forEach(v => {
                            allSentences.push({
                                h: s.h + g.p_wa.h + o.h + g.p_o.h + v.h,
                                r: s.r + g.p_wa.r + o.r + g.p_o.r + v.r
                            });
                        });
                    });
                });

                // Get unique items
                const uniqueMap = new Map(allSentences.map(item => [item.h, item]));
                const uniqueSentences = Array.from(uniqueMap.values());

                // Filter by exact length requested
                let filtered = uniqueSentences.filter(w => w.h.length === len);
                
                // Fallback: If no exact length exists, find the closest available length
                if (filtered.length === 0) {
                    const sortedByClosest = uniqueSentences.sort((a,b) => Math.abs(a.h.length - len) - Math.abs(b.h.length - len));
                    const closestLen = sortedByClosest[0].h.length;
                    filtered = uniqueSentences.filter(w => w.h.length === closestLen);
                }

                // Shuffle and pick up to 50 items
                return filtered.sort(() => Math.random() - 0.5).slice(0, 50);
            }

            if (len === 1) {
                for (const char of chars) pool.push({ h: char, r: charMap[char] });
                return pool;
            }

            while (pool.length < 50) {
                let hStr = "", rStr = "";
                for(let j=0; j<len; j++) {
                    const char = chars[Math.floor(Math.random() * chars.length)];
                    hStr += char;
                    rStr += charMap[char];
                }
                if (!used.has(hStr)) {
                    pool.push({h: hStr, r: rStr});
                    used.add(hStr);
                }
            }
            return pool;
        }

        function selectMode(category) {
            selectedCategory = category;
            const labels = {hiragana: 'Hiragana Blitz', katakana: 'Katakana Blitz', kanji: 'Kanji Blitz'};
            modeLabel.innerText = labels[category];
            
            if (category === 'kanji') {
                document.getElementById('n-level-section').classList.remove('hidden');
                document.getElementById('word-type-section').classList.add('hidden');
            } else {
                document.getElementById('n-level-section').classList.add('hidden');
                document.getElementById('word-type-section').classList.remove('hidden');
            }

            homeScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        }

        function showHome() {
            clearInterval(timerInterval);
            modeLabel.innerText = "Japanese Speed Test by Jinsun";
            timerDisplay.classList.add('hidden'); // Ensure timer is hidden on home
            
            startScreen.classList.add('hidden');
            quizScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            exitModal.classList.add('hidden');
            homeScreen.classList.remove('hidden');
            isPaused = false;
        }

        function startGame() {
            const targetLength = parseInt(lengthInput.value) || 1;
            currentPool = buildPool(selectedCategory, targetLength);

            score = 0;
            timeLeft = totalTime;
            isPaused = false;
            
            startScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            timerDisplay.classList.remove('hidden'); // Show timer when game starts
            
            if (selectedCategory === 'kanji') {
                levelBadge.innerText = `JLPT N${currentNLevel}`;
                levelBadge.classList.remove('hidden');
            } else if (wordType === 'real') {
                levelBadge.innerText = `Vocabulary`;
                levelBadge.classList.remove('hidden');
            } else {
                levelBadge.classList.add('hidden');
            }
            
            updateScore();
            nextWord();
            
            setTimeout(() => answerInput.focus(), 50);
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPaused) {
                    timeLeft -= 0.1;
                    if (timeLeft <= 0) {
                        timeLeft = 0; // Force zero
                        updateTimer();
                        endGame();
                    }
                    else updateTimer();
                }
            }, 100);
        }

        function promptExit() { isPaused = true; exitModal.classList.remove('hidden'); }
        function cancelExit() { isPaused = false; exitModal.classList.add('hidden'); answerInput.focus(); }
        function confirmExit() { showHome(); }

        function updateTimer() {
            const displayTime = Math.max(0, Math.ceil(timeLeft));
            timerDisplay.innerText = `00:${displayTime.toString().padStart(2, '0')}`;
            timerBar.style.width = `${(timeLeft / totalTime) * 100}%`;
        }

        function nextWord() {
            if (currentPool.length === 0) { endGame(); return; }
            let newWord;
            do {
                newWord = currentPool[Math.floor(Math.random() * currentPool.length)];
            } while (newWord === currentWord && currentPool.length > 1);
            
            currentWord = newWord;
            wordDisplay.innerText = currentWord.h;
            
            if (selectedCategory === 'kanji' && currentWord.hint) {
                hintDisplay.innerText = `"${currentWord.hint}"`;
            } else {
                hintDisplay.innerText = "";
            }
            
            answerInput.value = '';
        }

        function updateScore() { scoreDisplay.innerText = score; }

        function endGame() {
            clearInterval(timerInterval);
            quizScreen.classList.add('hidden');
            timerDisplay.classList.add('hidden'); // Hide countdown timer
            endScreen.classList.remove('hidden');
            
            // Set end screen stats
            finalScore.innerText = score;
            finalLevel.innerText = selectedCategory === 'kanji' ? `N${currentNLevel}` : (wordType === 'real' ? 'Vocab' : 'Random');
            finalDuration.innerText = `${totalTime}s`;
            
            const wpm = (score / totalTime) * 60;
            feedbackMsg.innerText = wpm > 30 ? "Amazing speed!" : "Great effort, keep practicing!";
        }

        answerInput.addEventListener('input', (e) => {
            if (isPaused) return;
            if (e.target.value.toLowerCase().trim() === currentWord.r) {
                score++;
                updateScore();
                nextWord();
            }
        });

        answerInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (answerInput.value.toLowerCase().trim() !== currentWord.r) {
                    answerInput.classList.add('shake');
                    setTimeout(() => answerInput.classList.remove('shake'), 400);
                }
            }
        });
    </script>
</body>
